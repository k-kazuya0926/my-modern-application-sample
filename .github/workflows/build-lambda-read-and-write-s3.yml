name: build-lambda-read-and-write-s3
on:
  push:
    branches: [main]
    paths:
      - applications/read-and-write-s3/**
      - .github/workflows/build-lambda-read-and-write-s3.yml
defaults: # パイプエラーを拾えるようにデフォルトシェルを設定
  run:
    shell: bash
concurrency: # コミット追加時に古いワークフローの実行を自動キャンセル
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    strategy:
      matrix:
        env: [prod] # 用意する環境に応じて変更
    runs-on: ubuntu-latest
    environment: ${{ matrix.env }}
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write
    env:
      ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ github.event.repository.name }}-${{ matrix.env }}-github-actions
      SESSION_NAME: gh-oidc-${{ github.run_id }}-${{ github.run_attempt }}
      ECR_REPOSITORY_URI: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ github.event.repository.name }}-${{ matrix.env }}-read-and-write-s3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
      - name: Run lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.11.4
          working-directory: applications/read-and-write-s3
      - name: Run tests
        run: |
          cd applications/read-and-write-s3
          go test -v ./...
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6 一時クレデンシャルの取得
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          role-session-name: ${{ env.SESSION_NAME }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: ./.github/actions/build-lambda/
        id: build
        with:
          ecr-repository-uri: ${{ env.ECR_REPOSITORY_URI }}
          function-name: read-and-write-s3
      # デプロイまで行う場合は次のようにする
      # - uses: ./.github/actions/deploy-lambda/
      #   with:
      #     function-name: ${{ github.event.repository.name }}-${{ matrix.env }}-read-and-write-s3
      #     image-uri: ${{ steps.build.outputs.image-uri }}
